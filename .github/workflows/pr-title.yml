name: Conventional Commit PR title

on:
    pull_request:
        types:
            - opened
            - edited
            - reopened
            - synchronize
            - converted_to_draft
            - ready_for_review
        branches:
            - 'main'
    workflow_dispatch:

jobs:
    pr-title-validation:
        if: github.event.pull_request.draft == false
        runs-on: self-hosted-ubuntu-22.04-arm-2-cores
        timeout-minutes: 1

        steps:
            - uses: amannn/action-semantic-pull-request@v6
              with:
                  types: |
                      build
                      feat
                      fix
                      chore
                      docs
                      refactor
                      perf
                      test
                      ci
                  wip: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
